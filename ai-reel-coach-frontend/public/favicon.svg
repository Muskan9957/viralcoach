<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00E5FF" />
      <stop offset="45%"  stop-color="#00C8FF" />
      <stop offset="100%" stop-color="#7B5CF0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="url(#bg)" />
  <rect width="40" height="40" rx="10" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8" />

  <!-- V / Wings -->
  <path d="M5 34 L13 19 L19 27 L25 19 L33 34"
    fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="2.4"
    stroke-linecap="round" stroke-linejoin="round" />

  <!-- Rocket body -->
  <path d="M18 27 L27 9 L37 9 L37 19 Z" fill="rgba(255,255,255,0.92)" />

  <!-- Rocket tip -->
  <path d="M31 9 L37 9 L37 15 Z" fill="rgba(0,229,255,0.95)" />

  <!-- Lightning bolt -->
  <path d="M31 10 L26 20 L30 20 L25 30"
    stroke="rgba(0,229,255,1)" stroke-width="2.2"
    stroke-linecap="round" stroke-linejoin="round" />
  <path d="M31 10 L26 20 L30 20 L25 30"
    stroke="rgba(255,255,255,0.6)" stroke-width="0.7"
    stroke-linecap="round" stroke-linejoin="round" />

  <!-- Circuit node -->
  <circle cx="33" cy="13" r="2.2" fill="rgba(0,229,255,0.95)" />
  <line x1="33" y1="13" x2="30" y2="20" stroke="rgba(255,255,255,0.25)" stroke-width="0.9" />

  <!-- Constellation -->
  <circle cx="10" cy="15" r="2"   fill="rgba(255,255,255,0.72)" />
  <circle cx="7"  cy="22" r="1.4" fill="rgba(255,255,255,0.48)" />
  <circle cx="14" cy="11" r="1.3" fill="rgba(255,255,255,0.58)" />
  <line x1="10" y1="15" x2="7"  y2="22" stroke="rgba(255,255,255,0.28)" stroke-width="0.8" />
  <line x1="10" y1="15" x2="14" y2="11" stroke="rgba(255,255,255,0.28)" stroke-width="0.8" />

  <!-- Sparkles -->
  <circle cx="22" cy="6"  r="0.9" fill="white" opacity="0.5" />
  <circle cx="35" cy="27" r="1"   fill="rgba(0,229,255,0.7)" />
</svg>
