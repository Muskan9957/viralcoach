<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clapperboard body — violet -->
  <rect x="6" y="44" width="88" height="50" rx="5" fill="#9060FF"/>
  <rect x="6" y="44" width="88" height="7"  rx="5" fill="rgba(255,255,255,0.18)"/>

  <!-- Lower clapper bar — cyan -->
  <rect x="6" y="32" width="88" height="14" rx="2" fill="#00CCFF"/>
  <!-- Diagonal stripes on lower bar -->
  <line x1="18" y1="32" x2="6"  y2="46" stroke="rgba(0,0,0,0.30)" stroke-width="4"/>
  <line x1="30" y1="32" x2="18" y2="46" stroke="rgba(0,0,0,0.30)" stroke-width="4"/>
  <line x1="42" y1="32" x2="30" y2="46" stroke="rgba(0,0,0,0.30)" stroke-width="4"/>
  <line x1="54" y1="32" x2="42" y2="46" stroke="rgba(0,0,0,0.30)" stroke-width="4"/>
  <line x1="66" y1="32" x2="54" y2="46" stroke="rgba(0,0,0,0.30)" stroke-width="4"/>
  <line x1="78" y1="32" x2="66" y2="46" stroke="rgba(0,0,0,0.30)" stroke-width="4"/>
  <line x1="90" y1="32" x2="78" y2="46" stroke="rgba(0,0,0,0.30)" stroke-width="4"/>
  <rect x="6" y="32" width="88" height="5"  rx="2" fill="rgba(255,255,255,0.20)"/>
  <line x1="6" y1="46" x2="94" y2="46" stroke="rgba(0,0,0,0.20)" stroke-width="1"/>

  <!-- Upper clapper board — angled, cyan -->
  <path d="M 6 32 L 94 19 L 94 9 L 6 22 Z" fill="#00CCFF"/>
  <!-- Diagonal stripes on upper board -->
  <line x1="18" y1="22" x2="6"  y2="32" stroke="rgba(0,0,0,0.30)" stroke-width="4"/>
  <line x1="30" y1="20" x2="18" y2="30" stroke="rgba(0,0,0,0.30)" stroke-width="4"/>
  <line x1="42" y1="19" x2="30" y2="29" stroke="rgba(0,0,0,0.30)" stroke-width="4"/>
  <line x1="54" y1="17" x2="42" y2="27" stroke="rgba(0,0,0,0.30)" stroke-width="4"/>
  <line x1="66" y1="16" x2="54" y2="26" stroke="rgba(0,0,0,0.30)" stroke-width="4"/>
  <line x1="78" y1="14" x2="66" y2="24" stroke="rgba(0,0,0,0.30)" stroke-width="4"/>
  <line x1="90" y1="13" x2="78" y2="23" stroke="rgba(0,0,0,0.30)" stroke-width="4"/>
  <path d="M 6 22 L 94 9 L 94 12 L 6 25 Z" fill="rgba(255,255,255,0.18)"/>

  <!-- Hinge pin -->
  <circle cx="12" cy="27" r="4" fill="#0A1880"/>
  <circle cx="12" cy="27" r="2" fill="#80E8FF" opacity="0.9"/>

  <!-- Play triangle — white -->
  <path d="M 35 57 L 35 80 L 68 68.5 Z" fill="rgba(255,255,255,0.75)"/>
</svg>
