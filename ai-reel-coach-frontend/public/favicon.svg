<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E1440"/>
      <stop offset="100%" stop-color="#090C24"/>
    </linearGradient>
    <linearGradient id="vg" x1="8" y1="4" x2="84" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00CCFF"/>
      <stop offset="100%" stop-color="#9060FF"/>
    </linearGradient>
    <linearGradient id="pg" x1="57" y1="6" x2="89" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#9040D8"/>
      <stop offset="100%" stop-color="#FF2878"/>
    </linearGradient>
    <linearGradient id="ag" x1="83" y1="14" x2="98" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FF4820"/>
      <stop offset="100%" stop-color="#FFB040"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Shadow layer -->
  <path d="M 50 15 C 48 15, 46 18, 42 24" stroke="#0A1880" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M 42 24 A 17 17 0 1 0 42 48"   stroke="#0A1880" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M 42 48 C 46 44, 52 64, 52 84" stroke="#0A1880" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M 52 84 C 60 68, 68 46, 73 28" stroke="#0A1880" stroke-width="13" stroke-linecap="round" fill="none"/>

  <!-- Main gradient strokes -->
  <path d="M 50 15 C 48 15, 46 18, 42 24" stroke="url(#vg)" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M 42 24 A 17 17 0 1 0 42 48"   stroke="url(#vg)" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M 42 48 C 46 44, 52 64, 52 84" stroke="url(#vg)" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M 52 84 C 60 68, 68 46, 73 28" stroke="url(#vg)" stroke-width="9" stroke-linecap="round" fill="none"/>

  <!-- Play circle -->
  <circle cx="73" cy="22" r="16" fill="url(#pg)"/>
  <path d="M 68 16 L 68 28 L 82 22 Z" fill="white" opacity="0.93"/>

  <!-- Trending arrow ↗ -->
  <line x1="83" y1="12" x2="97" y2="1"  stroke="url(#ag)" stroke-width="8" stroke-linecap="round"/>
  <path d="M 91 1 L 97 1 L 97 8"         stroke="url(#ag)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
